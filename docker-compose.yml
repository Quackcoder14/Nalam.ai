version: "3.9"

services:
  # ── MySQL 8.0 Database ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: nalam_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nalam_secret}
      MYSQL_DATABASE:      nalamdb
      MYSQL_USER:          nalamuser
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-nalam_pass}
    ports:
      - "3306:3306"
    volumes:
      - nalam_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB Vector Store ─────────────────────────────────────────────────
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: nalam_chroma
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - nalam_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python FastAPI ML Service (LangGraph) ─────────────────────────────────
  ml-service:
    build:
      context: ./src/ml-service
      dockerfile: Dockerfile.ml
    container_name: nalam_ml
    restart: unless-stopped
    ports:
      - "8005:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nalam_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:    mysql://nalamuser:${MYSQL_PASSWORD:-nalam_pass}@db:3306/nalamdb
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY}
      GROQ_API_KEY:    ${GROQ_API_KEY}
      ML_SERVICE_URL:  http://ml-service:8001
      NODE_ENV:        production
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    volumes:
      - ./datasets:/app/datasets:ro

volumes:
  nalam_mysql_data:
  nalam_chroma_data:
